<!-- 5. Multiple Object Animation

Objective: Animate multiple objects moving independently
Tool: HTML Canvas + JavaScript -->
<!DOCTYPE html>
<html>
<body>

<canvas id="canvas" width="500" height="300" style="border:1px solid black;"></canvas>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let balls = [
 {x:50,y:50,dx:2,dy:3},
 {x:200,y:80,dx:3,dy:2},
 {x:350,y:120,dx:2,dy:4}
];

let radius = 15;

function animate(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 balls.forEach(ball=>{
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,radius,0,Math.PI*2);
    ctx.fillStyle="red";
    ctx.fill();

    if(ball.x+radius>canvas.width || ball.x-radius<0) ball.dx=-ball.dx;
    if(ball.y+radius>canvas.height || ball.y-radius<0) ball.dy=-ball.dy;

    ball.x += ball.dx;
    ball.y += ball.dy;
 });

 requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
